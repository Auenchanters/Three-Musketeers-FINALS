name: PostmortemEnv
version: "1.0.0"
description: >
  An epistemic RL environment where LLM agents investigate cloud outages
  that have already happened. The agent receives frozen telemetry (logs,
  traces, commits, configs, infra events) and must identify the root cause
  and causal chain within a bounded query budget.
author: Three Musketeers
tags:
  - openenv
  - postmortem
  - incident-investigation
  - epistemic-rl
  - root-cause-analysis
license: "MIT"
repo: "https://github.com/Auenchanters/Three-Musketeers-FINALS"

observation_model: models.observation.Observation
action_model: models.action.Action
reward_model: models.reward.Reward

tasks:
  - id: task1_recent_deploy
    name: "Recent Deploy Blames"
    difficulty: easy
    description: "Single-service outage caused by a recent deploy. Identify the culprit commit."
    max_steps: 40

  - id: task2_cascade_chain
    name: "Cascade Chain"
    difficulty: medium
    description: "Cross-service cascade: an upstream bug propagates through the service DAG. Find the cause and trace the chain."
    max_steps: 75

  - id: task3_correlated_cause
    name: "Correlated Root Cause"
    difficulty: hard
    description: "A deploy and a concurrent infrastructure event combine to cause the outage. Neither alone is sufficient."
    max_steps: 120

  - id: task4_multi_region_failover
    name: "Multi-Region Failover Clock-Skew"
    difficulty: hard
    description: "12 services across 2 regions x 2 AZs. EU auth rejects US-region tokens during a ~90s DNS TTL refresh window — a clock-skew bug interacting with NTP slew."
    max_steps: 100

  - id: task5_data_corruption_cascade
    name: "Symptom-Inverted Data Corruption"
    difficulty: hard
    description: "Silent data corruption in batch publishes records that fail downstream checksums; latency on the read path masquerades as a network problem. Cause is a checksum-removal commit, not a network event."
    max_steps: 75

endpoints:
  reset: /reset
  step: /step
  state: /state
  health: /health
