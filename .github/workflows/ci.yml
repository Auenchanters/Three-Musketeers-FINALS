name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check . --exclude training_data --exclude data/scenarios
        continue-on-error: true

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t postmortemenv:ci .

      - name: Smoke test container
        run: |
          docker run -d --name pme -p 7860:7860 postmortemenv:ci
          sleep 8
          curl --fail --silent http://localhost:7860/health
          docker stop pme
